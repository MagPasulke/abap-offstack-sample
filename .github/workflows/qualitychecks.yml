name: qualitychecks

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
    - name: Install dependencies
      run: npm install
    - name: Lint
      run: npm run lint
    - name: Transpile and run unit tests
      run: npm run unit